envVarGroups:
  - name: ai-talent-match-shared
    envVars:
      - key: ENV
        value: production
      # --- Database (Supabase Postgres, pooler connection string) ---
      - key: DATABASE_URL
        sync: false
      # --- Redis (Celery broker/result backend — Redis Cloud) ---
      - key: REDIS_URL
        sync: false
      # --- Qdrant Cloud ---
      - key: QDRANT_URL
        sync: false
      - key: QDRANT_API_KEY
        sync: false
      # --- Observability (leave blank in the dashboard to run with Sentry disabled) ---
      - key: SENTRY_DSN
        sync: false
      # --- Auth ---
      - key: JWT_SECRET_KEY
        sync: false
      - key: JWT_ACCESS_TOKEN_EXPIRE_MINUTES
        value: "15"
      - key: JWT_REFRESH_TOKEN_EXPIRE_DAYS
        value: "30"
      # --- Google OAuth (candidate login) — leave blank to run with it disabled (503) ---
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GOOGLE_OAUTH_REDIRECT_URI
        sync: false
      # --- Deployed web app URL: used for CORS origin + email links ---
      - key: FRONTEND_URL
        sync: false
      # --- NVIDIA hosted inference (LLM parsing + embeddings) ---
      - key: NVIDIA_API_KEY
        sync: false
      - key: NVIDIA_BASE_URL
        value: https://integrate.api.nvidia.com/v1
      - key: NVIDIA_LLM_MODEL
        value: nvidia/nemotron-3-ultra-550b-a55b
      - key: NVIDIA_EMBEDDING_MODEL
        value: nvidia/nv-embedqa-e5-v5
      # --- Supabase Storage (S3-compatible, resume files) ---
      - key: SUPABASE_S3_ENDPOINT_URL
        sync: false
      - key: SUPABASE_S3_ACCESS_KEY_ID
        sync: false
      - key: SUPABASE_S3_SECRET_ACCESS_KEY
        sync: false
      - key: SUPABASE_S3_REGION
        value: us-east-1
      - key: SUPABASE_STORAGE_BUCKET
        value: resumes

services:
  - type: web
    name: ai-talent-match-api
    runtime: docker
    dockerfilePath: infra/docker/Dockerfile.api
    dockerContext: .
    dockerCommand: uv run uvicorn src.main:app --host 0.0.0.0 --port 8000
    plan: starter
    healthCheckPath: /ready
    envVarGroups:
      - ai-talent-match-shared

  - type: worker
    name: ai-talent-match-worker
    runtime: docker
    dockerfilePath: infra/docker/Dockerfile.worker
    dockerContext: .
    plan: starter
    envVarGroups:
      - ai-talent-match-shared

  - type: worker
    name: ai-talent-match-beat
    runtime: docker
    dockerfilePath: infra/docker/Dockerfile.worker
    dockerContext: .
    dockerCommand: uv run --project ../../apps/api celery -A main.celery_app beat --loglevel=info
    plan: starter
    envVarGroups:
      - ai-talent-match-shared
